apiVersion: apps/v1
kind: Deployment
metadata:
  name: cicd-githubacc-with-node
  labels:
    app: cicd-githubacc-with-node
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cicd-githubacc-with-node
  template:
    metadata:
      labels:
        app: cicd-githubacc-with-node
    spec:
      containers:
        - name: app
          image: $IMAGE
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: cicd-githubacc-with-node-svc
spec:
  selector:
    app: cicd-githubacc-with-node
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
